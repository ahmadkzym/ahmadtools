<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>KineMaster Web Pro</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --km-red: #e91e63; --km-dark: #111; --km-panel: #181818; }
        body { margin: 0; padding: 0; background: var(--km-dark); color: white; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; }

        /* الشاشة الرئيسية مقسمة لثلاثة أجزاء */
        .left-bar { width: 60px; background: #000; display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 20px; border-left: 1px solid #333; }
        .main-editor { flex: 1; display: flex; flex-direction: column; position: relative; }
        .right-controls { width: 180px; background: var(--km-panel); display: flex; align-items: center; justify-content: center; position: relative; }

        /* منطقة المعاينة */
        .preview-screen { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        video { max-height: 90%; max-width: 95%; border: 1px solid #222; }

        /* عجلة الوسائط الاحترافية */
        .km-wheel { width: 150px; height: 150px; background: #222; border-radius: 50%; position: relative; border: 4px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .wheel-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 55px; height: 55px; background: var(--km-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 5; cursor: pointer; }
        .w-item { position: absolute; color: #aaa; cursor: pointer; font-size: 14px; text-align: center; width: 40px; }
        .w-top { top: 10px; left: 50%; transform: translateX(-50%); }
        .w-right { top: 50%; right: 10px; transform: translateY(-50%); }
        .w-bottom { bottom: 10px; left: 50%; transform: translateX(-50%); }
        .w-left { top: 50%; left: 10px; transform: translateY(-50%); }

        /* الجدول الزمني السفلي */
        .timeline { height: 120px; background: #121212; border-top: 2px solid #333; position: relative; overflow: hidden; }
        .time-marker { position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: red; z-index: 10; }
        .layer { height: 30px; margin: 5px 10px; background: #1e3a5f; border-radius: 4px; display: flex; align-items: center; padding: 0 10px; font-size: 10px; border: 1px solid #2c5282; }

        /* أزرار جانبية */
        .icon-btn { color: #888; font-size: 20px; cursor: pointer; transition: 0.3s; }
        .icon-btn:hover { color: white; }
        .export-btn { color: var(--km-red); }

        #status-txt { position: absolute; bottom: 5px; left: 5px; font-size: 10px; color: #555; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="left-bar">
        <i class="fas fa-cog icon-btn"></i>
        <i class="fas fa-undo icon-btn"></i>
        <i class="fas fa-redo icon-btn"></i>
        <i class="fas fa-share-square icon-btn export-btn" title="تصدير" id="render-btn"></i>
    </div>

    <div class="main-editor">
        <div class="preview-screen">
            <video id="v-player" controls></video>
            <div id="status-txt">جاهز..</div>
        </div>
        
        <div class="timeline">
            <div class="time-marker"></div>
            <div class="layer"><i class="fas fa-video"></i> &nbsp; طبقة الفيديو الرئيسية</div>
            <div class="layer" style="background: #5f4b1e; border-color: #826a2c;"><i class="fas fa-music"></i> &nbsp; صوت الخلفية</div>
        </div>
    </div>

    <div class="right-controls">
        <div class="km-wheel">
            <div class="wheel-center" onclick="playVideo()"><i class="fas fa-play"></i></div>
            <div class="w-item w-top" onclick="document.getElementById('file-up').click()"><i class="fas fa-images"></i><br>الوسائط</div>
            <div class="w-item w-right" onclick="alert('قريباً')"><i class="fas fa-music"></i><br>صوت</div>
            <div class="w-item w-bottom" onclick="alert('سجل')"><i class="fas fa-microphone"></i><br>REC</div>
            <div class="w-item w-left" onclick="alert('طبقة')"><i class="fas fa-layer-group"></i><br>طبقة</div>
        </div>
    </div>

    <input type="file" id="file-up" accept="video/*">

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: false });
        let videoFile;

        document.getElementById('file-up').onchange = (e) => {
            videoFile = e.target.files[0];
            if(videoFile) {
                document.getElementById('v-player').src = URL.createObjectURL(videoFile);
                document.getElementById('status-txt').innerText = "تم تحميل الفيديو ✅";
            }
        };

        function playVideo() {
            const v = document.getElementById('v-player');
            if(v.paused) v.play(); else v.pause();
        }

        document.getElementById('render-btn').onclick = async () => {
            if(!videoFile) return alert("يرجى رفع فيديو أولاً");
            const st = document.getElementById('status-txt');
            st.innerText = "جاري الحفظ (تصدير)... ⏳";
            
            if(!ffmpeg.isLoaded()) await ffmpeg.load();
            ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(videoFile));

            // معالجة الفيديو (هنا نطبق القص التلقائي لضمان العمل)
            await ffmpeg.run('-i', 'input.mp4', '-t', '15', 'output.mp4');

            const data = ffmpeg.FS('readFile', 'output.mp4');
            const url = URL.createObjectURL(new Blob([data.buffer], {type: 'video/mp4'}));
            const a = document.createElement('a');
            a.href = url;
            a.download = "KineMaster_Export.mp4";
            a.click();
            st.innerText = "تم التصدير بنجاح! ✅";
        };
    </script>
</body>
</html>
