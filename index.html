<!DOCTYPE html>

<head>

  <style>

  <video id="result" controls width="600"></video>

  <script>
    async function createVideo() {
      const text = document.getElementById("script").value;
      const character = document.getElementById("character").value;

      // الرابط الآن مؤقت / فيديو تجريبي
      // لاحقًا استبدله برابط API للفيديو AI
      const videoUrl = "https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4";

      // عرض الفيديو

    }
  </script>
</body>
</html>
